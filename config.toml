[server]
server_secret = "test-secret-for-debugging"

[sandbox]
enabled = false

[ui]
port = 9765
pin = ""

[keys.test]
token = "test"

# Only grant tool access — NO filesystem grants.
# This forces list_dir to be denied, requiring request_access.
[[keys.test.rules]]
effect = "grant"
type   = "tool"
name   = "*"