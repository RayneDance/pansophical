# ══════════════════════════════════════════════════════════════════
# Web Search (DuckDuckGo)
# ══════════════════════════════════════════════════════════════════
# Performs a web search via DuckDuckGo's lite (HTML) endpoint.
# Returns lightweight HTML with result titles, URLs, and snippets
# that are easy for an AI agent to parse.
#
# Uses curl.exe (not the PowerShell alias) with -A for user-agent.
#
# Requires a network grant in the key's policy rules.

name            = "web_search"
description     = "Search the web for a query using DuckDuckGo. Returns an HTML page with search result titles, URLs, and text snippets. Parse the 'result-link' class anchors for titles and hrefs."
command         = "curl.exe"
args            = [
    "-s", "-L",
    "--max-time", "10",
    "-A", "Mozilla/5.0 (compatible; Pansophical/1.0)",
    "https://lite.duckduckgo.com/lite/?q={query}",
]
allow_shell     = false
arg_passthrough = false

[[parameters]]
name        = "query"
description = "The search query string"
required    = true

[[resources]]
type = "network"
path = "*"
perm = "r"
