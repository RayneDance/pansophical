# ══════════════════════════════════════════════════════════════════
# AST Outline — Reverse Dependencies
# ══════════════════════════════════════════════════════════════════
# Shows which files import a given file — the "blast radius" of
# changes. Essential before refactoring to know what would break.

name            = "ast_reverse_deps"
description     = "Find all files that import a given file — the blast radius of changes. Essential before refactoring to know what would break. Builds and caches a file-level import graph. Supports Rust, Python, TypeScript/JavaScript, Java, C#, Kotlin, Scala, and Go."
command         = "ast-outline"
args            = ["reverse-deps", "{path}"]
allow_shell     = false
arg_passthrough = false

[[parameters]]
name        = "path"
description = "Absolute path to the source file to find reverse dependencies for."
required    = true

[[resources]]
type = "filesystem"
path_from_arg = "path"
perm = "r"
