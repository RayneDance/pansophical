# ══════════════════════════════════════════════════════════════════
# AST Outline — Digest Module
# ══════════════════════════════════════════════════════════════════
# Produces a compact, one-page structural map of an entire module
# or directory — all files, all top-level symbols, with line ranges.
#
# Think of it as `ast_map` but for a whole directory tree, condensed
# into a single scannable overview. Great for understanding the shape
# of an unfamiliar module before diving into specific files.

name            = "digest"
group           = "ast"
description     = "Produce a compact one-page structural map of an entire directory or module. Lists all files with their top-level symbols (functions, classes, structs, traits, etc.) and line ranges. Use this to quickly understand the shape of an unfamiliar module before drilling into specific files with ast_show. Typically ~100 lines for a whole module."
command         = "ast-outline"
args            = ["digest", "{path}"]
allow_shell     = false
arg_passthrough = false

[[parameters]]
name        = "path"
description = "Absolute path to a directory or module to digest."
required    = true

[[resources]]
type = "filesystem"
path_from_arg = "path"
perm = "r"
